name: mobile_cashier
description: "Mobile Cashier - Aplikasi Kasir Mobile Lengkap"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.5

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  badges: ^3.1.2
  percent_indicator: ^4.2.3

  # Forms & Validation
  reactive_forms: ^17.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  collection: ^1.18.0
  equatable: ^2.0.5

  # Barcode / QR
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # Print / PDF
  pdf: ^3.10.8
  printing: ^5.13.1

  # Camera & Image
  image_picker: ^1.1.2
  image: ^4.2.0

  # Permissions
  permission_handler: ^11.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Dates
  table_calendar: ^3.1.2

  # Number formatting
  currency_text_input_formatter: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
